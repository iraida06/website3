<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Вход и регистрация - Эко-Приключения со Смешариками</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.8.0/firebase-firestore-compat.js"></script>
    
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #EAFFE8 0%, #D4F5D0 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        .auth-container {
            max-width: 550px;
            width: 100%;
            background: white;
            border-radius: 40px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.15);
            overflow: hidden;
            animation: slideUp 0.5s ease-out;
        }

        @keyframes slideUp {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .auth-header {
            background: linear-gradient(135deg, #3DDE3D, #10D9E0, #A727F0);
            padding: 30px;
            text-align: center;
            color: white;
        }

        .auth-header img {
            width: 80px;
            height: 80px;
            border-radius: 50%;
            margin-bottom: 15px;
            border: 3px solid white;
            object-fit: cover;
        }

        .auth-header h1 {
            font-size: 28px;
            margin-bottom: 5px;
        }

        .auth-header p {
            font-size: 14px;
            opacity: 0.9;
        }

        .auth-content {
            padding: 30px;
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-group label {
            display: block;
            margin-bottom: 8px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .form-group input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 15px;
            font-size: 16px;
            transition: all 0.3s ease;
        }

        .form-group input:focus {
            outline: none;
            border-color: #10D9E0;
            box-shadow: 0 0 0 3px rgba(16, 217, 224, 0.1);
        }

        .avatar-selection {
            margin-bottom: 20px;
        }

        .avatar-selection label {
            display: block;
            margin-bottom: 10px;
            font-weight: 600;
            color: #333;
            font-size: 14px;
        }

        .avatars-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 15px;
        }

        .avatar-option {
            text-align: center;
            cursor: pointer;
            padding: 10px;
            border-radius: 15px;
            transition: all 0.3s ease;
            border: 2px solid transparent;
        }

        .avatar-option:hover {
            transform: translateY(-5px);
            background: #f5f5f5;
        }

        .avatar-option.selected {
            border-color: #10D9E0;
            background: rgba(16, 217, 224, 0.1);
        }

        .avatar-option img {
            width: 60px;
            height: 60px;
            border-radius: 50%;
            margin-bottom: 5px;
            object-fit: cover;
        }

        .avatar-option span {
            font-size: 12px;
            color: #666;
            display: block;
        }

        .btn {
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 25px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            margin-top: 10px;
        }

        .btn-primary {
            background: linear-gradient(135deg, #3DDE3D, #10D9E0);
            color: white;
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(61, 222, 61, 0.3);
        }

        .btn-primary:disabled {
            opacity: 0.6;
            transform: none;
            cursor: not-allowed;
        }

        .switch-mode {
            text-align: center;
            margin-top: 20px;
            padding-top: 20px;
            border-top: 1px solid #e0e0e0;
        }

        .switch-mode a {
            color: #10D9E0;
            text-decoration: none;
            font-weight: 600;
            cursor: pointer;
        }

        .switch-mode a:hover {
            text-decoration: underline;
        }

        .error-message {
            background: #fee;
            color: #c33;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .success-message {
            background: #efe;
            color: #3a3;
            padding: 12px;
            border-radius: 12px;
            margin-bottom: 20px;
            text-align: center;
            font-size: 14px;
            display: none;
        }

        .loading-spinner {
            display: inline-block;
            width: 16px;
            height: 16px;
            border: 2px solid white;
            border-radius: 50%;
            border-top-color: transparent;
            animation: spin 0.6s linear infinite;
            margin-right: 8px;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        @media (max-width: 480px) {
            .avatars-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .auth-content {
                padding: 20px;
            }
        }
    </style>
</head>
<body>
    <div class="auth-container">
        <div class="auth-header">
            <img src="ФотоГл/Иконка.png" alt="Логотип" onerror="this.src='https://via.placeholder.com/80'">
            <h1>🌿 Эко-Приключения</h1>
            <p>со Смешариками</p>
        </div>
        
        <div class="auth-content">
            <div id="errorMessage" class="error-message"></div>
            <div id="successMessage" class="success-message"></div>
            
            <!-- Форма входа -->
            <div id="loginForm">
                <div class="form-group">
                    <label>👤 Имя пользователя</label>
                    <input type="text" id="loginUsername" placeholder="Введите ваше имя" autocomplete="off">
                </div>
                <button class="btn btn-primary" id="loginBtn" onclick="login()">🚪 Войти</button>
                
                <div class="switch-mode">
                    <a onclick="switchToRegister()">📝 Нет аккаунта? Зарегистрироваться</a>
                </div>
            </div>
            
            <!-- Форма регистрации -->
            <div id="registerForm" style="display: none;">
                <div class="form-group">
                    <label>👤 Имя пользователя</label>
                    <input type="text" id="regUsername" placeholder="Как вас зовут?" autocomplete="off">
                </div>
                <div class="form-group">
                    <label>🎂 Возраст</label>
                    <input type="number" id="regAge" placeholder="Сколько вам лет?" min="4" max="12">
                </div>
                <div class="avatar-selection">
                    <label>🎨 Выберите аватар</label>
                    <div class="avatars-grid" id="avatarsGrid"></div>
                </div>
                <button class="btn btn-primary" id="registerBtn" onclick="register()">✨ Зарегистрироваться</button>
                
                <div class="switch-mode">
                    <a onclick="switchToLogin()">🔑 Уже есть аккаунт? Войти</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        // ========== НАСТРОЙКА FIREBASE ==========
        // ⚠️ ЗАМЕНИТЕ ЭТИ ДАННЫЕ НА ВАШИ ИЗ КОНСОЛИ FIREBASE! ⚠️
        
// Конфигурация Firebase для вашего веб-приложения
// Для Firebase JS SDK версии 7.20.0 и более поздних версий параметр measurementId является необязательным
const firebaseConfig = {
 apiKey: "AIzaSyCY2mFu6xUL70sZhQKWv_CnM5DzGhfiPvI",
authDomain: "ecoadventures-1c201.firebaseapp.com",
 projectId: "ecoadventures-1c201",
 storageBucket: "ecoadventures-1c201.firebasestorage.app",
 messagingSenderId: "865358200859",
 appId: "1:865358200859:web:62ec18608185782719b8be",
 measurementId: "G-JS1JE6PJZW"
};
        
        // Инициализация Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();
        
        // ========== ДАННЫЕ ==========
        // Массив доступных аватаров
        const avatars = [
            { id: 'krosh', name: 'Крош', img: 'ФотоГл/крош2.png' },
            { id: 'losyash', name: 'Лосяш', img: 'ФотоГл/Лосяш.png' },
            { id: 'pin', name: 'Пин', img: 'ФотоГл/пин.png' },
            { id: 'sovunya', name: 'Совунья', img: 'ФотоГл/Совунья.png' }
        ];
        
        let selectedAvatar = avatars[0];
        
        // ========== ВСПОМОГАТЕЛЬНЫЕ ФУНКЦИИ ==========
        function showError(message) {
            const errorDiv = document.getElementById('errorMessage');
            errorDiv.textContent = message;
            errorDiv.style.display = 'block';
            setTimeout(() => {
                errorDiv.style.display = 'none';
            }, 4000);
        }
        
        function showSuccess(message) {
            const successDiv = document.getElementById('successMessage');
            successDiv.textContent = message;
            successDiv.style.display = 'block';
            setTimeout(() => {
                successDiv.style.display = 'none';
            }, 3000);
        }
        
        function setButtonLoading(buttonId, isLoading) {
            const btn = document.getElementById(buttonId);
            if (isLoading) {
                btn.disabled = true;
                btn.innerHTML = '<span class="loading-spinner"></span> Загрузка...';
            } else {
                btn.disabled = false;
                btn.innerHTML = btn.id === 'loginBtn' ? '🚪 Войти' : '✨ Зарегистрироваться';
            }
        }
        
        // ========== ЗАГРУЗКА АВАТАРОВ ==========
        function loadAvatars() {
            const container = document.getElementById('avatarsGrid');
            if (!container) return;
            container.innerHTML = '';
            
            avatars.forEach(avatar => {
                const avatarDiv = document.createElement('div');
                avatarDiv.className = 'avatar-option';
                if (avatar.id === selectedAvatar.id) {
                    avatarDiv.classList.add('selected');
                }
                avatarDiv.onclick = () => {
                    selectedAvatar = avatar;
                    document.querySelectorAll('.avatar-option').forEach(opt => opt.classList.remove('selected'));
                    avatarDiv.classList.add('selected');
                };
                avatarDiv.innerHTML = `
                    <img src="${avatar.img}" alt="${avatar.name}" onerror="this.src='https://via.placeholder.com/60'">
                    <span>${avatar.name}</span>
                `;
                container.appendChild(avatarDiv);
            });
        }
        
        // ========== РЕГИСТРАЦИЯ (СОХРАНЕНИЕ В FIRESTORE) ==========
        async function register() {
            const username = document.getElementById('regUsername').value.trim();
            const age = parseInt(document.getElementById('regAge').value);
            
            // Валидация
            if (!username) {
                showError('❌ Пожалуйста, введите имя!');
                return;
            }
            
            if (username.length < 2) {
                showError('❌ Имя должно содержать минимум 2 символа!');
                return;
            }
            
            if (isNaN(age) || age < 4 || age > 12) {
                showError('❌ Возраст должен быть от 4 до 12 лет!');
                return;
            }
            
            setButtonLoading('registerBtn', true);
            
            try {
                // Проверка, существует ли пользователь с таким именем
                const existingUser = await db.collection('users')
                    .where('username', '==', username)
                    .get();
                
                if (!existingUser.empty) {
                    showError('❌ Пользователь с таким именем уже существует!');
                    setButtonLoading('registerBtn', false);
                    return;
                }
                
                // Создание нового пользователя в Firestore
                const userData = {
                    username: username,
                    age: age,
                    avatar: selectedAvatar.img,
                    avatarName: selectedAvatar.name,
                    totalScore: 0,
                    gamesPlayed: 0,
                    createdAt: new Date().toISOString(),
                    lastLogin: new Date().toISOString()
                };
                
                const docRef = await db.collection('users').add(userData);
                
                // Сохраняем в localStorage для автоматического входа
                const userForStorage = {
                    id: docRef.id,
                    ...userData
                };
                localStorage.setItem('currentUser', JSON.stringify(userForStorage));
                
                showSuccess('✅ Регистрация прошла успешно! Добро пожаловать, ' + username + '!');
                
                setTimeout(() => {
                    window.location.href = 'ГлавнаяОр.html';
                }, 1500);
                
            } catch (error) {
                console.error('Ошибка регистрации:', error);
                showError('❌ Ошибка при регистрации. Проверьте подключение к интернету.');
                setButtonLoading('registerBtn', false);
            }
        }
        
        // ========== ВХОД В СИСТЕМУ ==========
        async function login() {
            const username = document.getElementById('loginUsername').value.trim();
            
            if (!username) {
                showError('❌ Пожалуйста, введите имя!');
                return;
            }
            
            setButtonLoading('loginBtn', true);
            
            try {
                // Поиск пользователя в Firestore
                const userSnapshot = await db.collection('users')
                    .where('username', '==', username)
                    .get();
                
                if (userSnapshot.empty) {
                    showError('❌ Пользователь не найден! Зарегистрируйтесь.');
                    setButtonLoading('loginBtn', false);
                    return;
                }
                
                const userDoc = userSnapshot.docs[0];
                const userData = userDoc.data();
                
                // Обновляем время последнего входа
                await db.collection('users').doc(userDoc.id).update({
                    lastLogin: new Date().toISOString()
                });
                
                // Сохраняем в localStorage
                const userForStorage = {
                    id: userDoc.id,
                    ...userData
                };
                localStorage.setItem('currentUser', JSON.stringify(userForStorage));
                
                showSuccess('✅ Добро пожаловать, ' + username + '!');
                
                setTimeout(() => {
                    window.location.href = 'ГлавнаяОр.html';
                }, 1000);
                
            } catch (error) {
                console.error('Ошибка входа:', error);
                showError('❌ Ошибка при входе. Проверьте подключение к интернету.');
                setButtonLoading('loginBtn', false);
            }
        }
        
        // ========== ПЕРЕКЛЮЧЕНИЕ МЕЖДУ ФОРМАМИ ==========
        function switchToRegister() {
            document.getElementById('loginForm').style.display = 'none';
            document.getElementById('registerForm').style.display = 'block';
            loadAvatars();
            // Очищаем ошибки
            document.getElementById('errorMessage').style.display = 'none';
        }
        
        function switchToLogin() {
            document.getElementById('registerForm').style.display = 'none';
            document.getElementById('loginForm').style.display = 'block';
            // Очищаем ошибки
            document.getElementById('errorMessage').style.display = 'none';
        }
        
        // ========== ПРОВЕРКА АВТОРИЗАЦИИ ==========
        async function checkAuth() {
            const currentUser = localStorage.getItem('currentUser');
            if (currentUser) {
                try {
                    const user = JSON.parse(currentUser);
                    // Проверяем, существует ли пользователь в БД
                    const userDoc = await db.collection('users').doc(user.id).get();
                    if (userDoc.exists) {
                        // Уже есть пользователь - отправляем на главную
                        window.location.href = 'ГлавнаяОр.html';
                    } else {
                        // Пользователь не найден в БД, удаляем из localStorage
                        localStorage.removeItem('currentUser');
                    }
                } catch (error) {
                    console.error('Ошибка проверки:', error);
                }
            }
        }
        
        // ========== ИНИЦИАЛИЗАЦИЯ ==========
        document.addEventListener('DOMContentLoaded', () => {
            checkAuth();
            loadAvatars();
            
            // Добавляем обработчик Enter для форм
            document.getElementById('loginUsername')?.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') login();
            });
            document.getElementById('regUsername')?.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') register();
            });
            document.getElementById('regAge')?.addEventListener('keypress', (e) => {
                if (e.key === 'Enter') register();
            });
        });
    </script>
</body>
</html>
